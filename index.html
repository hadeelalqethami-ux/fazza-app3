<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فزعة جار | النخوة بمفهوم تقني</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">فزعة جار</div>
            <div id="nakwa-status">مؤشر النخوة: <span id="points">150</span> 🏆</div>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h1>حوّل "النخوة" إلى أصل رقمي موثق</h1>
            <p>شارك أدواتك، ساهم بمهارتك، وابنِ مجتمعك (رؤية 2030).</p>
            <div class="cta-buttons">
                <button class="btn-primary" onclick="requestService('طلب أداة')">محتاج غرض؟</button>
            </div>
            <div class="main-image">
                <img src="docs/radar.png" alt="رادار الفزعة الذكي">
            </div>
        </section>

        <section class="tech-section">
            <h2>الرهابة التقنية: الصناديق الذكية</h2>
            <div class="image-wrapper">
                <img src="docs/iot-box.png" alt="الصناديق الذكية في الأحياء">
            </div>
            <p>تبادل آمن، ذكي، وبدون تلامس لضمان خصوصية الجيران.</p>
        </section>

        <section class="money-section">
            <h2>نموذج الربح والاستدامة</h2>
            <div class="image-wrapper">
                <img src="docs/pro-dashboard.png" alt="لوحة تحكم فزعة برو">
            </div>
            <p>تمكين الفنيين المحليين بعمولة 10% تضمن استدامة المنصة.</p>
        </section>
    </main>

    <script src="src/script.js"></script>
</body>
</html>
