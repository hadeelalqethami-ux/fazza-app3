<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazza Jar | Experience 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <nav class="glass-nav">
            <div class="logo">فزعة جار</div>
            <div class="user-score">
                <span class="label">مؤشر النخوة</span>
                <span id="score-value" class="value">150</span>
                <span class="medal">🏆</span>
            </div>
        </nav>

        <div id="app-canvas" class="canvas">
            <div id="step-1" class="step active">
                <div class="radar-wrapper">
                    <div class="radar-scanner"></div>
                    <div class="ping p1" onclick="selectNeighbor('أبو خالد', '🔨 مطرقة')">🔨</div>
                    <div class="ping p2" onclick="selectNeighbor('سارة', '💡 فني كهرباء')">💡</div>
                    <div class="ping p3" onclick="selectNeighbor('عائلة السالم', '🪜 سلم')">🪜</div>
                    <div class="user-center">📍</div>
                </div>
                <h2 class="glow-text">رادار الحي الذكي</h2>
                <p>اكتشف "النخوة" من حولك.. اضغط على أي أيقونة للبدء</p>
            </div>

            <div id="step-2" class="step">
                <div class="connection-card">
                    <div class="avatar-flow">
                        <div class="user-icon">أنت</div>
                        <div class="line"></div>
                        <div id="target-neighbor" class="neighbor-icon">..</div>
                    </div>
                    <h3>جاري الربط مع الجار...</h3>
                    <p id="request-detail"></p>
                    <div class="loading-bar"><div class="progress"></div></div>
                </div>
            </div>

            <div id="step-3" class="step">
                <div class="success-card">
                    <div class="success-icon">✅</div>
                    <h2>تمت الفزعة بنجاح!</h2>
                    <p>كيف كانت تجربة "النخوة" مع جارك؟</p>
                    <div class="rating-stars">
                        <span onclick="finalizeExperience()">⭐</span>
                        <span onclick="finalizeExperience()">⭐</span>
                        <span onclick="finalizeExperience()">⭐</span>
                        <span onclick="finalizeExperience()">⭐</span>
                        <span onclick="finalizeExperience()">⭐</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="src/script.js"></script>
</body>
</html>
