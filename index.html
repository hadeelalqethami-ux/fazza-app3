<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فزعة جار | النخوة بمفهوم تقني</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">فزعة جار</div>
            <div id="nakwa-status">مؤشر النخوة: <span id="points">150</span> 🏆</div>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h1>حوّل "النخوة" إلى أصل رقمي موثق</h1>
            <p>استعارة أدوات، تقديم خدمات، وبناء مجتمع مترابط (رؤية 2030).</p>
            <div class="cta-buttons">
                <button class="btn-primary" onclick="showRadarOptions()">محتاج غرض؟</button>
                <button class="btn-secondary" onclick="offerFazza()">ودي أفزع</button>
            </div>
            
            <div id="radar-options" class="hidden-options">
                <h3>اختر نوع الفزعة:</h3>
                <div class="options-grid">
                    <button class="opt-btn" onclick="requestFazza('مطرقة')">🔨 مطرقة</button>
                    <button class="opt-btn" onclick="requestFazza('سلم')">🪜 سلم</button>
                    <button class="opt-btn" onclick="requestFazza('دريل')">⚙️ دريل</button>
                    <button class="opt-btn" onclick="requestFazza('كهرباء')">💡 كهرباء</button>
                </div>
            </div>
        </section>

        <section class="prototype-showcase">
            <h2>تجربة المستخدم الحية (Live MVP)</h2>
            <div class="prototype-grid">
                <div class="prototype-card">
                    <div class="card-header">
                        <span class="icon">🔍</span>
                        <h3>رادار الحي الذكي</h3>
                    </div>
                    <div class="card-body radar-visual">
                        <div class="radar-circle"></div>
                        <div class="radar-dot dot-1" title="أبو خالد">👤</div>
                        <div class="radar-dot dot-2" title="عائلة السالم">👤</div>
                        <div class="radar-item item-1">🔨</div>
                        <p>جارك "أبو خالد" متاح للمساعدة.</p>
                    </div>
                </div>

                <div class="prototype-card">
                    <div class="card-header">
                        <span class="icon">📦</span>
                        <h3>الصناديق الذكية (IoT)</h3>
                    </div>
                    <div class="card-body boxes-visual">
                        <div class="smart-box box-open">QR</div>
                        <div class="smart-box box-closed">🔒</div>
                        <div class="smart-box box-closed">🔒</div>
                        <p>تبادل آمن وموثق للأدوات.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="src/script.js"></script>
</body>
</html>
