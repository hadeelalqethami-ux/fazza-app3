<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazza Jar | Hyper-Local Dashboard 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080a;
            --primary: #8b5cf6;
            --accent: #00f2ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.04);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية النظام */
        .system-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #0f1115;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass);
            border-right: 1px solid var(--glass);
            position: relative;
        }

        /* الهيدر المطور */
        header {
            padding: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass);
        }

        .user-profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wallet-info {
            text-align: left;
            background: linear-gradient(90deg, var(--primary), #4c1d95);
            padding: 5px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        /* منطقة التصفح (Scrollable) */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scrollbar-width: none;
        }

        .section-title {
            font-size: 1rem;
            color: var(--accent);
            margin: 20px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* رادار الفزعة المطور */
        .radar-box {
            height: 250px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            border-radius: 20px;
            position: relative;
            border: 1px solid var(--glass);
            overflow: hidden;
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(0, 242, 255, 0.1));
            animation: scanMove 3s infinite;
        }

        @keyframes scanMove { 0% { top: -50%; } 100% { top: 100%; } }

        /* سوق الاستعارة (أدوات كافية) */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .tool-card {
            background: var(--glass);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.75rem;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .tool-card:hover { border-color: var(--accent); background: rgba(0,242,255,0.05); }

        /* القطية الذكية */
        .funding-card {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid var(--success);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin: 10px 0;
        }

        .progress-fill { width: 65%; height: 100%; background: var(--success); border-radius: 3px; }

        /* الحرفيين الموثوقين */
        .pro-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .pro-card {
            min-width: 100px;
            background: var(--glass);
            padding: 10px;
            border-radius: 15px;
            text-align: center;
        }

        .pro-card img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--warning); }

        /* الأمن والخدمات */
        .security-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        /* الإعلانات المحلية */
        .local-ad {
            background: linear-gradient(45deg, #1e1b4b, #312e81);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border: 1px dashed var(--accent);
        }

        /* المدخلات */
        .input-group {
            background: var(--glass);
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-family: 'Tajawal'; }
