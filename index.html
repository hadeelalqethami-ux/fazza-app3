<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazza Jar | Smart District OS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --primary: #7c3aed;
            --accent: #00f2ff; /* نيون سماوي للرهابة التقنية */
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية الجهاز المستقبلي */
        .device-frame {
            width: 380px;
            height: 800px;
            background: #0f172a;
            border-radius: 50px;
            border: 4px solid #1e293b;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(124, 58, 237, 0.2);
            display: flex;
            flex-direction: column;
        }

        /* شريط الحالة الذكي */
        .status-bar {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--accent);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* مراحل الرحلة */
        .step {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step.active { display: flex; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* الرادار المطور 3D */
        .radar-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 40px auto;
            perspective: 1000px;
        }

        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: rotateX(60deg);
            border-radius: 20px;
        }

        .radar-core {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        .node {
            position: absolute;
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid var(--accent);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: var(--neon-glow);
        }

        .node:hover {
            transform: scale(1.3) translateY(-10px);
            background: var(--accent);
            color: black;
        }

        /* نظام التنبيهات الاستباقية */
        .insight-card {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            animation: bounce 2s infinite;
        }

        /* الربط اللاسلكي */
        .sync-animation {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .sync-circle {
            width: 80px;
            height: 80px;
            border: 3px solid var(--success);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }

        .beam {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            position: relative;
            overflow: hidden;
        }

        .beam::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: white;
            animation: stream 1s infinite;
        }

        @keyframes stream { 0% { left: -30px; } 100% { left: 100%; } }
        @keyframes rotate { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* الأزرار الفاخرة */
        .btn-finish {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="device-frame">
        <div class="status-bar">
            <div class="ai-status">
                <div class="pulse-dot"></div>
                AI الحي نشط
            </div>
            <div id="global-score" style="color: var(--success); font-weight: bold;">🏆 150</div>
        </div>

        <div id="step1" class="step active">
            <div class="radar-container">
                <div class="grid-bg"></div>
                <div class="radar-core"></div>
                <div class="node" style="top: 15%; left: 10%;" onclick="startFlow('أبو خالد', '🔨 مطرقة ثقيلة')">🔨</div>
                <div class="node" style="top: 50%; right: 10%;" onclick="startFlow('منزل السعد', '🪜 سلم هيدروليك')">🪜</div>
                <div class="node" style="bottom: 10%; left: 40%;" onclick="startFlow('المهندس فهد', '💡 فحص كهرباء')">💡</div>
            </div>
            <h2 style="color: var(--accent); text-shadow: var(--neon-glow);">رادار النخوة</h2>
